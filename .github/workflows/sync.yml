name: Sync projects

# Mantém os projetos em dia com a API do GitHub (stars, descrições, topics/stack,
# status de arquivamento). Roda toda segunda de manhã e sob demanda.
on:
  schedule:
    - cron: "0 6 * * 1" # toda segunda-feira, 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync with GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sync:github

      - name: Commit changes (if any)
        run: |
          if [[ -n "$(git status --porcelain src/data/projects.generated.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/projects.generated.json
            git commit -m "chore: sync projects from GitHub API"
            git push
          else
            echo "Nenhuma mudança nos projetos."
          fi
